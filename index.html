<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Puzzle & Kata Hijaiyyah</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <button id="lang-toggle" onclick="toggleLanguage()">ID / 日本語</button>
            <div class="stats">
                <div class="level-box">🧩 <span data-i18n="level">Level</span>: <span id="level-display">1</span>/45</div>
                <div class="score-box">⭐ <span data-i18n="score">Skor</span>: <span id="score-display">0</span></div>
            </div>
        </header>

        <main>
            <div id="stage-badge" class="stage-badge">Tahap 1: Pengenalan Huruf</div>
            <h2 id="instruction" data-i18n="instruction">Pasangkan huruf yang tepat!</h2>
            <p id="word-meaning" class="meaning-text hidden"></p>
            
            <div class="target-container">
                <div id="slots-wrapper" class="slots-wrapper">
                    </div>
                <div id="feedback-message" class="feedback hidden"></div>
            </div>

            <div id="options-container" class="options-grid"></div>
        </main>

        <div id="win-screen" class="hidden">
            <h1 data-i18n="winTitle">Masyaallah, Tamat!</h1>
            <p><span data-i18n="finalScore">Skor Akhir Kamu</span>: <span id="final-score">0</span></p>
            <button onclick="initGame()" class="btn-start" data-i18n="restartBtn">Main Lagi Dari Awal ▶</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
